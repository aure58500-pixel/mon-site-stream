<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CINEMA MODERNE</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #000000;
            --card-bg: #0a0a0a;
            --text: #ffffff;
            --text-dim: #a0a0a0;
            --accent: #ffffff;
        }

        * { box-sizing: border-box; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }

        /* Header */
        header {
            padding: 40px 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #1a1a1a;
        }

        header h1 {
            font-weight: 800;
            font-size: 1.5rem;
            letter-spacing: 2px;
            margin: 0;
        }

        .nav-links {
            color: var(--text-dim);
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Grid */
        .container {
            padding: 40px 5%;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 30px;
        }

        .movie-card {
            background: var(--card-bg);
            border-radius: 8px;
            overflow: hidden;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            cursor: pointer;
            position: relative;
        }

        .movie-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 20px 40px rgba(255, 255, 255, 0.05);
        }

        .movie-card img {
            width: 100%;
            height: 270px;
            object-fit: cover;
            filter: grayscale(100%);
            transition: filter 0.4s;
        }

        .movie-card:hover img {
            filter: grayscale(0%);
        }

        .movie-info {
            padding: 15px;
            border-top: 1px solid #1a1a1a;
        }

        .movie-title {
            font-size: 0.85rem;
            font-weight: 400;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Modal / Player */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(10px);
        }

        .modal-content {
            width: 90%;
            max-width: 1000px;
            position: relative;
        }

        .close-modal {
            position: absolute;
            top: -50px;
            right: 0;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            font-weight: 200;
        }

        iframe, video {
            width: 100%;
            aspect-ratio: 16/9;
            border: 1px solid #333;
            background: #000;
        }

        /* Loading Animation */
        #loader {
            text-align: center;
            padding: 50px;
            color: var(--text-dim);
            font-weight: 300;
        }
    </style>
</head>
<body>

    <header>
        <h1>FLUX.</h1>
        <div class="nav-links">Minimalist Streaming Interface</div>
    </header>

    <div class="container">
        <div id="loader">Chargement des derniers films...</div>
        <div class="movie-grid" id="movie-grid"></div>
    </div>

    <div class="modal" id="player-modal">
        <div class="modal-content">
            <span class="close-modal" id="close-btn">&times;</span>
            <div id="video-container"></div>
        </div>
    </div>

    <script>
        const movieGrid = document.getElementById('movie-grid');
        const loader = document.getElementById('loader');
        const modal = document.getElementById('player-modal');
        const videoContainer = document.getElementById('video-container');
        const closeBtn = document.getElementById('close-btn');

        // Fonction pour charger les films depuis le JSON
        async function loadMovies() {
            try {
                // Remplace 'movies.json' par l'URL brute de ton fichier sur GitHub si besoin
                const response = await fetch('movies.json');
                const movies = await response.json();
                
                loader.style.display = 'none';
                
                movies.forEach(movie => {
                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.innerHTML = `
                        <img src="${movie.img}" alt="${movie.title}" loading="lazy">
                        <div class="movie-info">
                            <div class="movie-title">${movie.title}</div>
                        </div>
                    `;
                    
                    card.onclick = () => openPlayer(movie.link);
                    movieGrid.appendChild(card);
                });
            } catch (error) {
                loader.innerText = "Erreur de chargement des données. Assurez-vous que movies.json existe.";
                console.error(error);
            }
        }

        function openPlayer(url) {
            // Si c'est un lien direct vers une iframe ou un embed
            videoContainer.innerHTML = `<iframe src="${url}" frameborder="0" allowfullscreen></iframe>`;
            modal.style.display = 'flex';
            document.body.style.overflow = 'hidden'; // Empêche le scroll
        }

        closeBtn.onclick = () => {
            modal.style.display = 'none';
            videoContainer.innerHTML = ''; // Arrête la vidéo
            document.body.style.overflow = 'auto';
        };

        window.onclick = (event) => {
            if (event.target == modal) closeBtn.onclick();
        };

        // Initialisation
        loadMovies();
    </script>
</body>
</html>
